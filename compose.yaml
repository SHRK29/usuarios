services:
  app:
    build: .
    container_name: usuarios_app
    volumes:
      - ./data:/app/data
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped