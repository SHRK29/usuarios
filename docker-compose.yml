services:
  postgres:
    image: postgres:16-alpine
    container_name: usuarios_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usuariosdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - usuarios_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usuariosdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app1: &app-base
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/usuariosdb?currentSchema=usuarios_schema
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      INSTANCE_TAG: app1
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - usuarios_net
    restart: unless-stopped

  app2:
    <<: *app-base
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/usuariosdb?currentSchema=usuarios_schema
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      INSTANCE_TAG: app2

  app3:
    <<: *app-base
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/usuariosdb?currentSchema=usuarios_schema
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      INSTANCE_TAG: app3

  app4:
    <<: *app-base
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/usuariosdb?currentSchema=usuarios_schema
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      INSTANCE_TAG: app4

  app5:
    <<: *app-base
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/usuariosdb?currentSchema=usuarios_schema
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      INSTANCE_TAG: app5

  nginx:
    image: nginx:1.27-alpine
    container_name: usuarios_nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
      - app4
      - app5
    networks:
      - usuarios_net
    restart: unless-stopped

networks:
  usuarios_net:
    driver: bridge

volumes:
  postgres_data:
